# Skip LFS-tracked binaries — CI doesn't pull LFS, so the MP4 checkout
# is a permission-denied pointer rather than the real file, and
# end-of-file-fixer chokes trying to read it.
exclude: '^assets/video/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: no-commit-to-branch

      # Common errors
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-executables-have-shebangs

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: detect-private-key

  # Python: ruff handles both lint and format. Matches super-linter's
  # PYTHON_RUFF + PYTHON_RUFF_FORMAT (PYTHON_BLACK is disabled there to
  # avoid the dueling-formatter problem).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
