# Skip:
#   - LFS-tracked binaries (assets/video/): CI doesn't pull LFS, so the
#     MP4 checkout is a permission-denied pointer rather than the real
#     file, and end-of-file-fixer chokes trying to read it.
#   - vendored frontend assets (pkg/server/static/): third-party htmx +
#     its SSE extension, kept byte-for-byte upstream — not ours to
#     reformat (no trailing newline, minified, etc.).
exclude: '^(assets/video/|pkg/server/static/)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Git style
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: no-commit-to-branch

      # Common errors
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-executables-have-shebangs

      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']
      - id: detect-private-key

  # Secrets: broad scan layered on top of the narrow detect-aws-credentials
  # / detect-private-key checks above. Sub-second. Reads the same
  # .github/linters/.gitleaks.toml super-linter's GITLEAKS pass uses, so the
  # two agree on what's a false positive (e.g. the public Discord guild
  # snowflake in the cdk8s manifests).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        args: [--config, .github/linters/.gitleaks.toml]

  # GitHub Actions workflow linting — fast, and catches the kind of
  # workflow breakage super-linter's actionlint pass would.
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Shell script linting (bin/, script/).
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Go formatting — gofmt only (not full golangci-lint) to avoid the
  # libvlc/cgo build issues that made super-linter disable Go. Auto-fixes
  # and fails the run if any file needed reformatting; re-stage and commit.
  # Needs the Go toolchain on PATH — CI provides it via mise (.tool-versions).
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        description: Format Go code with gofmt.
        entry: gofmt -l -w
        language: system
        types: [go]

  # Markdown linting — mirrors super-linter's MARKDOWN pass, reading the same
  # .github/linters/.markdown-lint.yml config so the two agree, and catching
  # markdown issues locally before CI. The towncrier Jinja template is named
  # .md (towncrier picks its markup from the extension) but isn't valid
  # markdown, so it's excluded here exactly as in super-linter.
  # language_version pins an LTS node via nodeenv rather than using whatever
  # node happens to be on the host/runner — markdownlint-cli's dev deps carry
  # a strict `engines` range that a too-new (or too-old) system node fails to
  # satisfy during `npm install`, which would make the hook non-deterministic.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        language_version: lts
        args: [--config, .github/linters/.markdown-lint.yml]
        exclude: '^\.github/towncrier-template\.md$'

  # Python: ruff handles both lint and format. Matches super-linter's
  # PYTHON_RUFF + PYTHON_RUFF_FORMAT (PYTHON_BLACK is disabled there to
  # avoid the dueling-formatter problem).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
