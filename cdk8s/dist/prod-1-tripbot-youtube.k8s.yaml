apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: tripbot-youtube
    app.kubernetes.io/part-of: tripbot
  name: tripbot-youtube-config
  namespace: prod-1
data:
  BOT_USERNAME: tripbot4000
  CHANNEL_NAME: adanalife_
  DATABASE_HOST: postgres.prod-1-data.svc.cluster.local
  ENV: production
  EXTERNAL_URL: https://tripbot-youtube.prod.whereisdana.today
  GOOGLE_APPS_PROJECT_ID: tripbot-prod
  MAPS_OUTPUT_DIR: /opt/data/maps
  NATS_URL: nats://nats.prod-1-platform.svc.cluster.local:4222
  OBS_SERVER_HOST: obs-youtube:8080
  OBS_WEBSOCKET_ADDR: obs-youtube:4455
  ONSCREENS_SERVER_HOST: onscreens-youtube:8080
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod-1,service.namespace=tripbot,service.platform=youtube
  OTEL_SDK_DISABLED: "false"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  READ_ONLY: "false"
  SENTRY_ENVIRONMENT: prod-1
  STREAM_PLATFORM: youtube
  TRIPBOT_SERVER_PORT: "8080"
  VERBOSE: "false"
  VLC_SERVER_HOST: vlc-youtube:8080
  YOUTUBE_INBOUND_ENABLED: "false"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/name: tripbot-youtube
    app.kubernetes.io/part-of: tripbot
  name: tripbot-youtube-creds
  namespace: prod-1
spec:
  dataFrom:
    - extract:
        key: k8s/tripbot/youtube-creds
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secretsmanager
  target:
    creationPolicy: Owner
    name: tripbot-youtube-creds
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: tripbot-youtube
    app.kubernetes.io/part-of: tripbot
  name: tripbot-youtube
  namespace: prod-1
spec:
  replicas: 0
  selector:
    matchLabels:
      app: tripbot-youtube
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: 54a56afcd2
      labels:
        app: tripbot-youtube
    spec:
      containers:
        - env:
            - name: USER
              value: tripbot
          envFrom:
            - configMapRef:
                name: tripbot-youtube-config
            - secretRef:
                name: tripbot-database-creds
            - secretRef:
                name: grafana-cloud-otlp
            - secretRef:
                name: sentry-tripbot
            - secretRef:
                name: tripbot-twitch-creds
            - secretRef:
                name: tripbot-google-maps-api-key
            - secretRef:
                name: tripbot-discord-alerts-webhook
                optional: true
            - secretRef:
                name: tripbot-discord-bot-token
                optional: true
            - secretRef:
                name: tripbot-youtube-creds
          image: adanalife/tripbot:3.9.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: tripbot-youtube
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      initContainers:
        - args:
            - -path
            - /migrations
            - -database
            - postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable
            - up
          command:
            - migrate
          envFrom:
            - configMapRef:
                name: tripbot-youtube-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/tripbot:3.9.1
          imagePullPolicy: IfNotPresent
          name: migrate
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      priorityClassName: prod-stream
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: tripbot-youtube
    app.kubernetes.io/part-of: tripbot
  name: tripbot-youtube
  namespace: prod-1
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: tripbot-youtube
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: tripbot-youtube.prod.whereisdana.today
  labels:
    app.kubernetes.io/name: tripbot-youtube
    app.kubernetes.io/part-of: tripbot
  name: tripbot-youtube
  namespace: prod-1
spec:
  ingressClassName: traefik
  rules:
    - host: tripbot-youtube.prod.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: tripbot-youtube
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - tripbot-youtube.prod.whereisdana.today
      secretName: tripbot-youtube-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tripbot-youtube-ts
  namespace: prod-1
spec:
  defaultBackend:
    service:
      name: tripbot-youtube
      port:
        number: 8080
  ingressClassName: tailscale
  tls:
    - hosts:
        - tripbot-youtube-prod
