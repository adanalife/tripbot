apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: obs-youtube
    app.kubernetes.io/instance: obs-youtube
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-youtube-config
  namespace: stage-1
data:
  DASHCAM_RTSP_URL: rtsp://vlc-youtube:8554/dashcam
  OBS_QUALITY_PRESET: low
  OBS_STREAM_ENCODER: obs_x264
  OBS_WEBSOCKET_PASSWD: adanalife
  ONSCREENS_URL_BASE: http://onscreens-youtube:8080
  STREAM_PLATFORM: youtube
  VLC_URL_BASE: http://vlc-youtube:8080
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: obs-youtube-stream-key
  namespace: stage-1
spec:
  data:
    - remoteRef:
        key: k8s/obs/youtube-stream-key
      secretKey: STREAM_KEY
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-secretsmanager
  target:
    creationPolicy: Owner
    name: obs-youtube-stream-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: obs-youtube
    app.kubernetes.io/instance: obs-youtube
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-youtube
  namespace: stage-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obs-youtube
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: 54bf302110
      labels:
        app: obs-youtube
        app.kubernetes.io/instance: obs-youtube
        app.kubernetes.io/name: obs
        app.kubernetes.io/part-of: tripbot
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: obs-youtube-config
            - secretRef:
                name: obs-youtube-stream-key
                optional: true
          image: adanalife/obs:develop
          imagePullPolicy: Always
          livenessProbe:
            exec:
              command:
                - /opt/obs/healthcheck.sh
            failureThreshold: 3
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          name: obs
          ports:
            - containerPort: 5900
              name: vnc
            - containerPort: 4455
              name: websocket
            - containerPort: 6080
              name: novnc
            - containerPort: 8080
              name: obs-server
          resources:
            limits:
              memory: 3Gi
            requests:
              cpu: 200m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: obs-youtube
    app.kubernetes.io/instance: obs-youtube
    app.kubernetes.io/name: obs
    app.kubernetes.io/part-of: tripbot
  name: obs-youtube
  namespace: stage-1
spec:
  ports:
    - name: vnc
      port: 5900
      targetPort: vnc
    - name: websocket
      port: 4455
      targetPort: websocket
    - name: novnc
      port: 6080
      targetPort: novnc
    - name: obs-server
      port: 8080
      targetPort: obs-server
  selector:
    app: obs-youtube
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: obs-youtube.stage.whereisdana.today
  name: obs-youtube
  namespace: stage-1
spec:
  ingressClassName: traefik
  rules:
    - host: obs-youtube.stage.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: obs-youtube
                port:
                  name: novnc
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - obs-youtube.stage.whereisdana.today
      secretName: obs-youtube-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obs-youtube-ts
  namespace: stage-1
spec:
  defaultBackend:
    service:
      name: obs-youtube
      port:
        number: 6080
  ingressClassName: tailscale
  tls:
    - hosts:
        - obs-youtube-stage
