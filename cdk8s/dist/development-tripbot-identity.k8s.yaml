apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/name: tripbot
    app.kubernetes.io/part-of: tripbot
  name: tripbot-database-creds
  namespace: development
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: SecretStore
  target:
    name: tripbot-database-creds
    template:
      type: Opaque
      data:
        DATABASE_USER: "{{ .user }}"
        DATABASE_PASS: "{{ .password }}"
        DATABASE_DB: "{{ .db }}"
  data:
    - secretKey: user
      remoteRef:
        key: /k8s/postgres/credentials
        property: user
    - secretKey: password
      remoteRef:
        key: /k8s/postgres/credentials
        property: password
    - secretKey: db
      remoteRef:
        key: /k8s/postgres/credentials
        property: db
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/name: tripbot
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch-creds
  namespace: development
spec:
  dataFrom:
    - extract:
        key: /k8s/tripbot/twitch-creds
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: aws-parameterstore
  target:
    creationPolicy: Owner
    name: tripbot-twitch-creds
