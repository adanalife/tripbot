apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch-config
  namespace: development
data:
  BOT_USERNAME: tripbot4001
  CHANNEL_NAME: adanalife_staging
  DATABASE_HOST: postgres
  ENV: staging
  EXTERNAL_URL: https://tripbot-twitch.dev.whereisdana.today:9443
  GOOGLE_APPS_PROJECT_ID: tripbot-stage
  MAPS_OUTPUT_DIR: /opt/data/maps
  NATS_URL: nats://nats.development-platform.svc.cluster.local:4222
  OBS_SERVER_HOST: obs-twitch:8080
  OBS_WEBSOCKET_ADDR: obs-twitch:4455
  ONSCREENS_SERVER_HOST: onscreens-twitch:8080
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=development,service.namespace=tripbot,service.platform=twitch
  OTEL_SDK_DISABLED: "true"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  READ_ONLY: "false"
  SENTRY_ENVIRONMENT: development
  TRIPBOT_SERVER_PORT: "8080"
  VERBOSE: "false"
  VLC_SERVER_HOST: vlc-twitch:8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripbot-twitch
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: fe7f09b6cc
      labels:
        app: tripbot-twitch
    spec:
      containers:
        - env:
            - name: USER
              value: tripbot
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
            - secretRef:
                name: grafana-cloud-otlp
            - secretRef:
                name: sentry-tripbot
            - secretRef:
                name: tripbot-twitch-creds
            - secretRef:
                name: tripbot-google-maps-api-key
            - secretRef:
                name: tripbot-discord-alerts-webhook
                optional: true
            - secretRef:
                name: tripbot-discord-bot-token
                optional: true
          image: adanalife/tripbot:develop
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: tripbot-twitch
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      initContainers:
        - args:
            - -path
            - /migrations
            - -database
            - postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable
            - up
          command:
            - migrate
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/tripbot:develop
          imagePullPolicy: Always
          name: migrate
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch
  namespace: development
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: tripbot-twitch
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: tripbot-twitch.dev.whereisdana.today
  labels:
    app.kubernetes.io/name: tripbot-twitch
    app.kubernetes.io/part-of: tripbot
  name: tripbot-twitch
  namespace: development
spec:
  ingressClassName: traefik
  rules:
    - host: tripbot-twitch.dev.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: tripbot-twitch
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - tripbot-twitch.dev.whereisdana.today
      secretName: tripbot-twitch-tls
