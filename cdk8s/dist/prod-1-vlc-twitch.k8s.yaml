apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch-config
  namespace: prod-1
data:
  DISPLAY: :0.0
  ENV: production
  FONTCONFIG_PATH: /etc/fonts
  NATS_URL: nats://nats.prod-1-platform.svc.cluster.local:4222
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=prod-1,service.namespace=tripbot,service.platform=twitch
  OTEL_SDK_DISABLED: "false"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  SENTRY_ENVIRONMENT: prod-1
  VLC_SERVER_HOST: vlc-twitch:8080
  XDG_RUNTIME_DIR: /root/.cache/xdgr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch
  namespace: prod-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vlc-twitch
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: "0575176656"
      labels:
        app: vlc-twitch
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: vlc-twitch-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          image: adanalife/vlc:3.2.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: vlc-twitch
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5900
              name: vnc
            - containerPort: 8554
              name: rtsp
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              gpu.intel.com/i915: "1"
              memory: 2Gi
            requests:
              cpu: "1"
              gpu.intel.com/i915: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data/Dashcam/_all
              name: dashcam
              readOnly: true
      priorityClassName: prod-stream
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: dashcam
          persistentVolumeClaim:
            claimName: vlc-dashcam
            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch
  namespace: prod-1
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: rtsp
      port: 8554
      targetPort: rtsp
    - name: vnc
      port: 5900
      targetPort: vnc
  selector:
    app: vlc-twitch
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/issuer: letsencrypt-route53
    external-dns.alpha.kubernetes.io/hostname: vlc-twitch.prod.whereisdana.today
  name: vlc-twitch
  namespace: prod-1
spec:
  ingressClassName: traefik
  rules:
    - host: vlc-twitch.prod.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: vlc-twitch
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - vlc-twitch.prod.whereisdana.today
      secretName: vlc-twitch-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vlc-twitch-ts
  namespace: prod-1
spec:
  defaultBackend:
    service:
      name: vlc-twitch
      port:
        number: 8080
  ingressClassName: tailscale
  tls:
    - hosts:
        - vlc-twitch-prod
