apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-auth-bootstrap
  namespace: default
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - command:
            - /usr/local/bin/auth-bootstrap
          env:
            - name: EXTERNAL_URL
              value: http://localhost:8080
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-secret
            - secretRef:
                name: tripbot-twitch-creds
                optional: true
          image: adanalife/tripbot:latest
          imagePullPolicy: Always
          name: auth-bootstrap
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      restartPolicy: Never
  ttlSecondsAfterFinished: 600
