apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-seed
  namespace: prod-1
spec:
  backoffLimit: 3
  template:
    spec:
      containers:
        - command:
            - /usr/local/bin/seed-db
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/tripbot:4.4.0@sha256:121491f29555440c039a46a569a7fa1f2e3dc6d2c5d2ce915bc4228ebade71f0
          imagePullPolicy: IfNotPresent
          name: seed
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      initContainers:
        - command:
            - sh
            - -c
            - until nc -z postgres.prod-1-data.svc.cluster.local 5432; do echo "waiting for postgres..."; sleep 2; done
          image: busybox:1.36
          name: wait-for-postgres
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
        - args:
            - -path
            - /migrations
            - -database
            - postgres://$(DATABASE_USER):$(DATABASE_PASS)@$(DATABASE_HOST):5432/$(DATABASE_DB)?sslmode=disable
            - up
          command:
            - migrate
          envFrom:
            - configMapRef:
                name: tripbot-twitch-config
            - secretRef:
                name: tripbot-database-creds
          image: adanalife/tripbot:4.4.0@sha256:121491f29555440c039a46a569a7fa1f2e3dc6d2c5d2ce915bc4228ebade71f0
          imagePullPolicy: IfNotPresent
          name: migrate
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      restartPolicy: Never
  ttlSecondsAfterFinished: 600
