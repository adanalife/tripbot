apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: onscreens-tiktok
    app.kubernetes.io/part-of: tripbot
  name: onscreens-tiktok-config
  namespace: stage-1
data:
  ENV: staging
  NATS_URL: nats://nats.stage-1-platform.svc.cluster.local:4222
  ONSCREENS_SERVER_PLATFORM: tiktok
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=stage-1,service.namespace=tripbot,service.platform=tiktok
  OTEL_SDK_DISABLED: "true"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  SENTRY_ENVIRONMENT: stage-1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: onscreens-tiktok
    app.kubernetes.io/part-of: tripbot
  name: onscreens-tiktok
  namespace: stage-1
spec:
  replicas: 0
  selector:
    matchLabels:
      app: onscreens-tiktok
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: 383b51f374
      labels:
        app: onscreens-tiktok
    spec:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: obs-tiktok
                topologyKey: kubernetes.io/hostname
              weight: 100
      containers:
        - envFrom:
            - configMapRef:
                name: onscreens-tiktok-config
            - secretRef:
                name: sentry-onscreens-server
                optional: true
            - secretRef:
                name: grafana-cloud-otlp
                optional: true
          image: adanalife/onscreens-server:main
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          name: onscreens-tiktok
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data/run
              name: run
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - effect: NoSchedule
          key: dana.lol/rpi5
          operator: Exists
      volumes:
        - emptyDir: {}
          name: run
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: onscreens-tiktok
    app.kubernetes.io/part-of: tripbot
  name: onscreens-tiktok
  namespace: stage-1
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: onscreens-tiktok
  type: ClusterIP
