apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: onscreens-twitch
    app.kubernetes.io/part-of: tripbot
  name: onscreens-twitch-config
  namespace: development
data:
  ENV: staging
  NATS_URL: nats://nats.development-platform.svc.cluster.local:4222
  ONSCREENS_SERVER_PLATFORM: twitch
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=development,service.namespace=tripbot,service.platform=twitch
  OTEL_SDK_DISABLED: "true"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  SENTRY_ENVIRONMENT: development
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: onscreens-twitch
    app.kubernetes.io/part-of: tripbot
  name: onscreens-twitch
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: onscreens-twitch
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: 842d76ab39
      labels:
        app: onscreens-twitch
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: onscreens-twitch-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          image: adanalife/onscreens-server:develop
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
          name: onscreens-twitch
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 25m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data/run
              name: run
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - emptyDir: {}
          name: run
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: onscreens-twitch
    app.kubernetes.io/part-of: tripbot
  name: onscreens-twitch
  namespace: development
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app: onscreens-twitch
  type: ClusterIP
