apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch-config
  namespace: development
data:
  BOT_USERNAME: adanalife_bot
  CHANNEL_NAME: adanalife
  DATABASE_DB: tripbot_docker
  DATABASE_HOST: postgres
  DATABASE_PASS: hunter2
  DATABASE_USER: tripbot_docker
  DISPLAY: :0.0
  ENV: staging
  FONTCONFIG_PATH: /etc/fonts
  NATS_URL: nats://nats.development-platform.svc.cluster.local:4222
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=development,service.namespace=tripbot,service.platform=twitch
  OTEL_SDK_DISABLED: "true"
  OTEL_TRACES_SAMPLER: parentbased_traceidratio
  OTEL_TRACES_SAMPLER_ARG: "0.1"
  SENTRY_ENVIRONMENT: development
  TWITCH_AUTH_TOKEN: oauth:stub
  TWITCH_CLIENT_ID: stub
  TWITCH_CLIENT_SECRET: stub
  VLC_SERVER_HOST: vlc-twitch:8080
  XDG_RUNTIME_DIR: /root/.cache/xdgr
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch
  namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vlc-twitch
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        adanalife.dev/config-hash: f2314b6653
      labels:
        app: vlc-twitch
    spec:
      containers:
        - envFrom:
            - configMapRef:
                name: vlc-twitch-config
            - secretRef:
                name: sentry-vlc-server
                optional: false
            - secretRef:
                name: grafana-cloud-otlp
                optional: false
          image: adanalife/vlc:develop
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          name: vlc-twitch
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 5900
              name: vnc
            - containerPort: 8554
              name: rtsp
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 2Gi
            requests:
              cpu: 200m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - mountPath: /opt/data/Dashcam/_all
              name: dashcam
              readOnly: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - hostPath:
            path: /host/dashcam
            type: Directory
          name: dashcam
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: vlc-twitch
    app.kubernetes.io/part-of: tripbot
  name: vlc-twitch
  namespace: development
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: rtsp
      port: 8554
      targetPort: rtsp
    - name: vnc
      port: 5900
      targetPort: vnc
  selector:
    app: vlc-twitch
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: vlc-twitch-host
  namespace: development
spec:
  ports:
    - name: vnc
      port: 5903
      targetPort: vnc
    - name: rtsp
      port: 8554
      targetPort: rtsp
  selector:
    app: vlc-twitch
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    external-dns.alpha.kubernetes.io/hostname: vlc-twitch.dev.whereisdana.today
  name: vlc-twitch
  namespace: development
spec:
  ingressClassName: traefik
  rules:
    - host: vlc-twitch.dev.whereisdana.today
      http:
        paths:
          - backend:
              service:
                name: vlc-twitch
                port:
                  name: http
            path: /
            pathType: Prefix
