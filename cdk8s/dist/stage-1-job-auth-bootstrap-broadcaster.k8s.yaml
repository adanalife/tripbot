apiVersion: batch/v1
kind: Job
metadata:
  name: tripbot-auth-bootstrap-broadcaster
  namespace: stage-1
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
        - args:
            - --account=broadcaster
          command:
            - /usr/local/bin/auth-bootstrap
          env:
            - name: EXTERNAL_URL
              value: http://localhost:8080
          envFrom:
            - configMapRef:
                name: tripbot-youtube-config
            - secretRef:
                name: tripbot-database-creds
            - secretRef:
                name: tripbot-twitch-creds
                optional: false
            - secretRef:
                name: tripbot-google-maps-api-key
                optional: false
          image: adanalife/tripbot:develop
          imagePullPolicy: Always
          name: auth-bootstrap
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      restartPolicy: Never
  ttlSecondsAfterFinished: 600
