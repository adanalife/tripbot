# Per-component image pins, keyed by env then image name.
#
# Envs listed here deploy pinned release versions (rollback = git revert the
# bump commit); envs absent here float on EnvConfig.image_tag (develop/latest).
# Tags are the un-suffixed multi-arch manifest tags from the tripbot release
# workflow — no `v` prefix (3.1.0, not v3.1.0).
#
# Edited by the bump-prs workflow (one PR per component); hand-edits are fine
# too — run `task cdk8s:synth` after changing a pin.
#
# The comment line between pins is load-bearing: git can't auto-merge edits on
# adjacent lines, so without a separator each merged bump PR conflicts the
# other three open ones.
prod-1:
  # restarts the chat bot only; no stream impact
  tripbot: "3.3.0"
  # restarting drops the playing video briefly on stream
  vlc: "3.3.0"
  # restarting takes the stream down until OBS reconnects — pick a quiet moment
  obs: "3.2.1"
  # overlays blip; the stream itself stays up
  onscreens-server: "3.3.0"
