language: python
app: uv run python main.py
output: dist
imports:
  - k8s
  # Typed construct for the one CRD the app/identity charts emit (ESO
  # ExternalSecret), generated from the schema vendored in crds/. Regenerated by
  # `cdk8s import` into imports/ (gitignored). cert-manager's Issuer CRD is NOT
  # imported here — the cert-manager Issuers stay in infra/cdk8s (SupportingChart),
  # so nothing in this repo references imports.io.cert_manager.
  #
  # NB: the ESO SecretStore CRD is deliberately NOT imported — its multi-provider
  # schema includes a `keepersecurity.getByTitleFallback` field that jsii rejects
  # (JSII5000: getXxx names conflict with Java getters), failing the whole import.
  # tripbot's charts don't emit a SecretStore anyway (infra's DataChart does); the
  # ExternalSecrets here just reference it by name.
  - crds/externalsecrets.external-secrets.io.yaml
