name: Release
on:
  push:
    tags:
      - v*

jobs:
  tripbot-build:
    name: tripbot-build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve bare version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/tripbot
          flavor: |
            latest=true
            suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/tripbot/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.value }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=tripbot-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=tripbot-${{ matrix.arch }}

      - name: Verify version stamping
        run: |
          IMAGE="adanalife/tripbot:${{ steps.ver.outputs.value }}-${{ matrix.arch }}"
          .github/scripts/verify-stamped-image.sh "$IMAGE" \
            "${{ steps.ver.outputs.value }}" "${{ github.sha }}"

  tripbot-manifest:
    needs: tripbot-build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/tripbot
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create multi-arch manifest lists
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "==> $tag = $tag-amd64 + $tag-arm64"
            docker buildx imagetools create -t "$tag" "$tag-amd64" "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  vlc-build:
    name: vlc-build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve bare version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/vlc
          flavor: |
            latest=true
            suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/vlc/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.value }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=vlc-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=vlc-${{ matrix.arch }}

      - name: Verify version stamping
        run: |
          IMAGE="adanalife/vlc:${{ steps.ver.outputs.value }}-${{ matrix.arch }}"
          .github/scripts/verify-stamped-image.sh "$IMAGE" \
            "${{ steps.ver.outputs.value }}" "${{ github.sha }}"

  vlc-manifest:
    needs: vlc-build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/vlc
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create multi-arch manifest lists
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "==> $tag = $tag-amd64 + $tag-arm64"
            docker buildx imagetools create -t "$tag" "$tag-amd64" "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  obs-build:
    name: obs-build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            dockerfile: infra/docker/obs/Dockerfile
          - arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: infra/docker/obs/Dockerfile.arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve bare version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Per-arch tags get a -<arch> suffix so the obs-manifest job can
      # later combine them into a multi-arch manifest list under the
      # un-suffixed tag. onlatest=true ensures the `latest` tag also
      # gets the suffix on per-arch images.
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/obs
          flavor: |
            latest=true
            suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.value }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=obs-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=obs-${{ matrix.arch }}

      - name: Verify version stamping
        run: |
          IMAGE="adanalife/obs:${{ steps.ver.outputs.value }}-${{ matrix.arch }}"
          .github/scripts/verify-stamped-image.sh "$IMAGE" \
            "${{ steps.ver.outputs.value }}" "${{ github.sha }}"

  obs-manifest:
    needs: obs-build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Same tag set as the per-arch legs but un-suffixed. Combine each
      # T-amd64 + T-arm64 pair into a multi-arch manifest list at T.
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/obs
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create multi-arch manifest lists
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "==> $tag = $tag-amd64 + $tag-arm64"
            docker buildx imagetools create -t "$tag" "$tag-amd64" "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  onscreens-server-build:
    name: onscreens-server-build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve bare version
        id: ver
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/onscreens-server
          flavor: |
            latest=true
            suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/onscreens-server/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.value }}
            SHA=${{ github.sha }}
          cache-from: type=gha,scope=onscreens-server-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=onscreens-server-${{ matrix.arch }}

      - name: Verify version stamping
        run: |
          IMAGE="adanalife/onscreens-server:${{ steps.ver.outputs.value }}-${{ matrix.arch }}"
          .github/scripts/verify-stamped-image.sh "$IMAGE" \
            "${{ steps.ver.outputs.value }}" "${{ github.sha }}"

  onscreens-server-manifest:
    needs: onscreens-server-build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: adanalife/onscreens-server
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create multi-arch manifest lists
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "==> $tag = $tag-amd64 + $tag-arm64"
            docker buildx imagetools create -t "$tag" "$tag-amd64" "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  # The auto-tag flow (bump-version.yml) creates only a git tag; this is what
  # makes the tag show up as a real GitHub Release with auto-generated notes
  # (the infra bump PRs link to it).
  github-release:
    needs: [tripbot-manifest, vlc-manifest, obs-manifest, onscreens-server-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" --generate-notes --verify-tag

  notify:
    needs: [tripbot-manifest, vlc-manifest, obs-manifest, onscreens-server-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Discord notification
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION_TAG: ${{ github.ref_name }}
        with:
          args: 'New Docker images released for [{{ EVENT_PAYLOAD.repository.full_name }}]({{ EVENT_PAYLOAD.repository.html_url }}): [{{ VERSION_TAG }}]({{ EVENT_PAYLOAD.compare }})'
