name: Release
on:
  push:
    tags:
      - v*

jobs:
  tripbot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: adanalife/tripbot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/tripbot/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          cache-from: type=gha,scope=tripbot
          cache-to: type=gha,mode=max,scope=tripbot

  vlc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: adanalife/vlc
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/vlc/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          cache-from: type=gha,scope=vlc
          cache-to: type=gha,mode=max,scope=vlc

  obs-build:
    name: obs-build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            dockerfile: infra/docker/obs/Dockerfile
          - arch: arm64
            runner: ubuntu-24.04-arm
            dockerfile: infra/docker/obs/Dockerfile.arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Per-arch tags get a -<arch> suffix so the obs-manifest job can
      # later combine them into a multi-arch manifest list under the
      # un-suffixed tag. onlatest=true ensures the `latest` tag also
      # gets the suffix on per-arch images.
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: adanalife/obs
          flavor: |
            latest=true
            suffix=-${{ matrix.arch }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          cache-from: type=gha,scope=obs-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=obs-${{ matrix.arch }}

  obs-manifest:
    needs: obs-build
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Same tag set as the per-arch legs but un-suffixed. Combine each
      # T-amd64 + T-arm64 pair into a multi-arch manifest list at T.
      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: adanalife/obs
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Create multi-arch manifest lists
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "==> $tag = $tag-amd64 + $tag-arm64"
            docker buildx imagetools create -t "$tag" "$tag-amd64" "$tag-arm64"
          done <<< "${{ steps.meta.outputs.tags }}"

  notify:
    needs: [tripbot, vlc, obs-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Discord notification
        uses: Ilshidur/action-discord@0.3.2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION_TAG: ${{ github.ref_name }}
        with:
          args: 'New Docker images released for [{{ EVENT_PAYLOAD.repository.full_name }}]({{ EVENT_PAYLOAD.repository.html_url }}): [{{ VERSION_TAG }}]({{ EVENT_PAYLOAD.compare }})'
