name: Release
on:
  push:
    tags:
      - v*

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tripbot — generate tags
        id: meta-tripbot
        uses: docker/metadata-action@v5
        with:
          images: adanalife/tripbot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: Tripbot — build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/tripbot/Dockerfile
          tags: ${{ steps.meta-tripbot.outputs.tags }}
          push: true
          cache-from: type=gha,scope=tripbot
          cache-to: type=gha,mode=max,scope=tripbot

      - name: OBS — generate tags
        id: meta-obs
        uses: docker/metadata-action@v5
        with:
          images: adanalife/obs
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: OBS — build & push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/obs/Dockerfile
          tags: ${{ steps.meta-obs.outputs.tags }}
          push: true
          cache-from: type=gha,scope=obs-amd64
          cache-to: type=gha,mode=max,scope=obs-amd64

      - name: VLC — generate tags
        id: meta-vlc
        uses: docker/metadata-action@v5
        with:
          images: adanalife/vlc
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=latest

      - name: VLC — build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/vlc/Dockerfile
          tags: ${{ steps.meta-vlc.outputs.tags }}
          push: true
          cache-from: type=gha,scope=vlc
          cache-to: type=gha,mode=max,scope=vlc

      - name: Discord notification
        uses: Ilshidur/action-discord@0.3.2
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION_TAG: ${{ github.ref_name }}
        with:
          args: 'New Docker images released for [{{ EVENT_PAYLOAD.repository.full_name }}]({{ EVENT_PAYLOAD.repository.html_url }}): [{{ VERSION_TAG }}]({{ EVENT_PAYLOAD.compare }})'
