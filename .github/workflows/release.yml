# Versioned multi-arch release build for the two images built from this repo
# (tripbot, onscreens-server), via the shared build-image.yml reusable
# workflow. Publishes `X.Y.Z` / `vX.Y` / `vX` / `latest` manifest lists (plus
# the per-arch `-amd64`/`-arm64` variants) to Docker Hub.
#
# NOT concurrency-guarded (unlike dev-image.yml): cancelling could drop a
# version, and per-version tags don't race.
name: release
on:
  push:
    tags:
      - v*
  # release-please.yml dispatches this at the tag it just created — a
  # GITHUB_TOKEN-created tag can't fire the push trigger above. The push
  # trigger stays for manually-pushed tags.
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tags: ${{ steps.ver.outputs.tags }}
    steps:
      - name: Resolve version + release tag set
        id: ver
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" != v[0-9]* ]]; then
            echo "::error::release must run at a vX.Y.Z tag ref (got '$GITHUB_REF_NAME')"
            exit 1
          fi
          V="${GITHUB_REF_NAME#v}"          # 3.16.0
          MAJOR_MINOR="v${V%.*}"            # v3.16
          MAJOR="v${V%%.*}"                 # v3
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tags=$V $MAJOR_MINOR $MAJOR latest" >> "$GITHUB_OUTPUT"

  tripbot:
    needs: version
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image: adanalife/tripbot
      dockerfile: infra/docker/tripbot/Dockerfile
      cache-scope: tripbot
      version: ${{ needs.version.outputs.version }}
      tags: ${{ needs.version.outputs.tags }}

  onscreens-server:
    needs: version
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image: adanalife/onscreens-server
      dockerfile: infra/docker/onscreens-server/Dockerfile
      cache-scope: onscreens-server
      version: ${{ needs.version.outputs.version }}
      tags: ${{ needs.version.outputs.tags }}

  notify:
    needs: [tripbot, onscreens-server]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Discord notification
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION_TAG: ${{ github.ref_name }}
        with:
          args: 'New Docker images released for [{{ EVENT_PAYLOAD.repository.full_name }}]({{ EVENT_PAYLOAD.repository.html_url }}): [{{ VERSION_TAG }}]({{ EVENT_PAYLOAD.compare }})'
