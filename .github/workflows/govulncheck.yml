name: govulncheck
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # No outer checkout — the action does its own checkout + setup-go
      # (an outer actions/checkout here leaves credentials around that
      # collide with the action's pinned checkout, yielding a
      # duplicate-Authorization 400 on fetch).
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
