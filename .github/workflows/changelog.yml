name: changelog

# Require every PR into main to add a towncrier changelog fragment under
# changelog.d/ (see README "Changelog"). This is what keeps the release
# changelog complete by construction, instead of reconstructing missing entries
# from PR bodies at release time.
#
# Escape hatch: add the `skip-changelog` label for PRs that genuinely warrant no
# entry (dependabot bumps, CI-only tweaks, pure refactors, doc fixes).
# release-please's own release PR is exempt by head branch — it collates the
# fragments, it doesn't add one.

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: changelog-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fragment:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') && github.head_ref != 'release-please--branches--main' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - name: Require a changelog fragment
        run: |
          git fetch origin "${{ github.base_ref }}" -q
          uvx towncrier check --config towncrier.toml --compare-with "origin/${{ github.base_ref }}"
