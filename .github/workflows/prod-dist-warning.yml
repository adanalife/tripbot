name: prod-dist-warning

# Warn on PRs into main that change a prod (prod-1) app deploy unit. prod-1
# apps autosync from main (AUTOSYNC_ENVS in infra's argocd.py), so MERGING
# such a PR deploys the change to prod — no separate gesture. That's expected
# on release-please's release PR (its re-synthed dist IS the deploy: vlc's
# restart briefly drops the playing video, so merge at a quiet moment), but
# easy to miss on a hand-edited pin rollback or any other PR that touches a
# prod dist/ file. This posts a sticky comment so the merge isn't done unaware.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  warn:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect prod app dist/ changes
        id: detect
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          # Three-dot diff = the PR's own changes (merge-base..head), so a stale
          # main doesn't produce false positives. Scope to the per-component
          # app units (`prod-1-*-twitch.k8s.yaml`) — these are the autosynced
          # deploy targets; jobs/identity/seed units aren't.
          FILES=$(git diff --name-only "$BASE...$HEAD" -- 'cdk8s/dist/prod-1-*-twitch.k8s.yaml')
          if [ -n "$FILES" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "list<<LIST"
              while IFS= read -r f; do
                # \140 is a literal backtick (avoids a shellcheck SC2016 false positive)
                printf -- '- \140%s\140\n' "$f"
              done <<< "$FILES"
              echo "LIST"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post warning
        if: steps.detect.outputs.changed == 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: prod-dist-warning
          message: |
            ⚠️ **This PR changes prod (`prod-1`) app deploy units.**

            prod-1 apps **autosync from `main`**, so **merging this PR deploys the change to prod** — no separate step. A change to the `vlc` unit means a brief stream impact when the pod restarts.

            Changed:
            ${{ steps.detect.outputs.list }}

            Make sure that's intended before merging.

      - name: Clear stale warning
        if: steps.detect.outputs.changed == 'false'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: prod-dist-warning
          delete: true
