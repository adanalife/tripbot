name: Testing
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

env:
  # `testing` (not `test`) ‚Äî TripbotConfig.IsTesting() compares against the
  # full word, so packages with init() shortcuts won't bail otherwise.
  ENV: testing
  # Required by package init() functions; values are placeholders so the
  # binaries can boot in CI without reaching real services.
  TWILIO_ACCT_SID: test
  TWILIO_AUTH_TOKEN: test
  TWILIO_FROM_NUM: test
  TWILIO_TO_NUM: test
  CHANNEL_NAME: test
  BOT_USERNAME: test
  EXTERNAL_URL: http://localhost
  GOOGLE_APPS_PROJECT_ID: test
  GOOGLE_MAPS_API_KEY: test
  TRIPBOT_HTTP_AUTH: test
  VLC_SERVER_HOST: http://localhost:8081
  VIDEO_DIR: /tmp
  RUN_DIR: /tmp
  DATABASE_USER: test
  DATABASE_DB: test
  DATABASE_HOST: localhost
  TWITCH_AUTH_TOKEN: test
  TWITCH_CLIENT_ID: test
  TWITCH_CLIENT_SECRET: test
jobs:
  test:
    strategy:
      matrix:
        go-version:
          - 1.21.x
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - name: Install Golang
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - uses: actions/checkout@v4
    - name: Restore Cache
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Install Dependencies (linux)
      if: matrix.platform == 'ubuntu-latest'
      run: sudo apt update && sudo apt install -y --no-install-recommends libvlc-dev
    - name: Run Go Tests
      run: go test ./...
    - name: Coverage Summary
      run: |
        go test -coverprofile=coverage.out ./...
        echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
        go tool cover -func=coverage.out | tail -1 | tee -a "$GITHUB_STEP_SUMMARY"
