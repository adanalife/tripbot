name: Testing
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  test:
    strategy:
      matrix:
        go-version:
          - 1.21.x
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4
    - name: Install Golang
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Restore Cache
      uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Install Dependencies (linux)
      if: matrix.platform == 'ubuntu-latest'
      run: sudo apt update && sudo apt install -y --no-install-recommends libvlc-dev
    # Source the same .env.testing that bin/devenv-test loads locally,
    # so package init() functions don't log.Fatalf on missing vars.
    - name: Load .env.testing
      run: grep -E '^[A-Z][A-Z0-9_]*=' .env.testing >> "$GITHUB_ENV"
    - name: Run Go Tests
      run: go test ./...
    - name: Coverage Summary
      run: |
        go test -coverprofile=coverage.out ./...
        echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
        go tool cover -func=coverage.out | tail -1 | tee -a "$GITHUB_STEP_SUMMARY"
