# Publishes floating :main multi-arch images on push to main, gated by
# per-image path filters — what stage-1 deploys (imagePullPolicy: Always picks
# up rebuilds under the tag). Prod stays on the pinned release tags
# (release.yml). Builds go through the same build-image.yml reusable workflow
# as the versioned releases.
name: dev-image
on:
  push:
    branches:
      - main

# Only build the newest main merge. A push that lands while a prior run is
# still building cancels that run, so rapid back-to-back merges don't fan out
# into N parallel multi-arch builds. A superseded run's images would be
# immediately stale anyway, since the next merge's HEAD is what stage deploys.
# (Versioned release.yml is NOT guarded: cancelling could drop a version, and
# per-version tags don't race.)
concurrency:
  group: dev-image
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Per-image path filters, so a merge that doesn't touch an image's build
  # surface doesn't rebuild it. Both images rebuild on any Go change — their
  # binaries transitively import shared pkg/** packages.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      tripbot: ${{ steps.filter.outputs.tripbot }}
      onscreens: ${{ steps.filter.outputs.onscreens }}
      version: main-${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v7
      - id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            tripbot:
              - 'cmd/tripbot/**'
              - 'pkg/**'
              # DB migrations are baked into the tripbot image and run by its
              # migrate initContainer at pod boot — so a migration-only PR must
              # rebuild the image, or the new migration never ships and the
              # initContainer reports "no change" against a stale image. (Bit us
              # 2026-06-19: #906's seed migration didn't reach the floating tag
              # because this filter didn't watch db/migrate.)
              - 'db/migrate/**'
              - 'infra/docker/tripbot/**'
              - 'go.mod'
              - 'go.sum'
              - '.dockerignore'
              - '.github/workflows/dev-image.yml'
              - '.github/workflows/build-image.yml'
            onscreens:
              # onscreens-server is a pure-Go binary that transitively imports
              # shared packages (pkg/telemetry, pkg/instrumentation, pkg/helpers,
              # pkg/httpmw, …), so match pkg/** like the tripbot filter
              # rather than a narrow onscreens-only glob.
              - 'cmd/onscreens-server/**'
              - 'pkg/**'
              - 'infra/docker/onscreens-server/**'
              - 'go.mod'
              - 'go.sum'
              - '.dockerignore'
              - '.github/workflows/dev-image.yml'
              - '.github/workflows/build-image.yml'

  tripbot:
    needs: changes
    if: needs.changes.outputs.tripbot == 'true'
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image: adanalife/tripbot
      dockerfile: infra/docker/tripbot/Dockerfile
      cache-scope: tripbot
      version: ${{ needs.changes.outputs.version }}
      tags: main

  onscreens-server:
    needs: changes
    if: needs.changes.outputs.onscreens == 'true'
    uses: ./.github/workflows/build-image.yml
    secrets: inherit
    with:
      image: adanalife/onscreens-server
      dockerfile: infra/docker/onscreens-server/Dockerfile
      cache-scope: onscreens-server
      version: ${{ needs.changes.outputs.version }}
      tags: main
