name: cdk8s

# Lints the Python cdk8s authoring layer (cdk8s/) and verifies the committed
# dist/ deploy units are in sync with the source: re-synth and fail on any diff.
# Verify-only — synth is fast enough to run locally via `task cdk8s:synth`, so
# (unlike infra's cdk8s.yml) there's no push-back commit. dist/ is the GitOps
# source Argo reads, so a stale dist/ on master would silently mis-deploy.
on:
  pull_request:
    paths:
      - 'cdk8s/**'
      - 'pkg/contract/contract.json'
      - '.github/workflows/cdk8s.yml'
  push:
    branches:
      - master
      - develop
    paths:
      - 'cdk8s/**'
      - 'pkg/contract/contract.json'
      - '.github/workflows/cdk8s.yml'

jobs:
  synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Toolchain via mise (cdk8s/.mise.toml pins python / node / cdk8s-cli).
      - uses: jdx/mise-action@v4
        with:
          working_directory: cdk8s

      # uv handles project-local Python deps on top of mise's interpreter.
      - uses: astral-sh/setup-uv@v7

      - name: Install Python deps
        working-directory: cdk8s
        run: uv sync

      - name: Generate typed k8s constructs (cdk8s import)
        working-directory: cdk8s
        run: mise exec -- uv run cdk8s import

      - name: Run synth-time checks
        working-directory: cdk8s
        run: mise exec -- uv run pytest -q

      - name: Synth
        working-directory: cdk8s
        run: mise exec -- uv run cdk8s synth

      - name: Verify dist/ is committed in sync
        run: git diff --exit-code -- cdk8s/dist/
