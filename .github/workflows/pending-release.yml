name: pending-release

# Maintains a single standing DRAFT PR from develop -> master that shows what
# the NEXT release would contain, so the version-bump decision can be made
# against a real diff + changelog instead of guessed up front. Modeled on
# bump-prs.yml's update-in-place pattern.
#
# This is a staging VIEW, not a release tool: it never merges anything. To cut
# a release: on develop run `task changelog:build VERSION=X.Y.Z` to collate the
# changelog.d/ fragments into CHANGELOG.md and commit; then rename this PR to
# "Release vX.Y.Z", mark it ready, and merge it with the bump token (#minor /
# #major; default patch) in the MERGE COMMIT message — auto-tag.yml reads the
# token from commits landing on master.
#
# The pending changelog shown in the PR body is rendered with `towncrier build
# --draft` from the fragments currently on develop.
#
# Once the PR is promoted out of draft (i.e. you've started cutting), this
# workflow stops touching it, so it won't clobber a body/title you've edited.
#
# The PR is created via the automation GitHub App token (same as bump-prs) so
# its pull_request events fire CI; GITHUB_TOKEN-created PRs don't trigger
# downstream workflows.

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pending-release
  cancel-in-progress: true

jobs:
  pending-release:
    runs-on: ubuntu-latest
    steps:
      - name: Mint automation app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: develop

      - uses: astral-sh/setup-uv@v7

      - name: Manage the pending-release draft PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git fetch origin master -q

          AHEAD=$(git rev-list --count origin/master..HEAD)

          # Find an existing open develop -> master PR (draft or not).
          PR_JSON=$(gh pr list --base master --head develop --state open \
            --json number,isDraft --jq '.[0] // empty')
          NUM=$(echo "$PR_JSON" | jq -r '.number // empty')
          IS_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft // empty')

          # Nothing queued (develop is in sync with master, e.g. just after a
          # release): retire the standing draft if one is open, then stop.
          if [ "$AHEAD" -eq 0 ]; then
            if [ -n "$NUM" ] && [ "$IS_DRAFT" = "true" ]; then
              gh pr close "$NUM" --comment "develop is in sync with master — nothing pending. A fresh draft opens when new work lands on develop."
            fi
            echo "develop has no commits ahead of master; nothing to stage."
            exit 0
          fi

          # If a maintainer has promoted the PR out of draft, it's now a real
          # release PR being cut by hand — hands off.
          if [ -n "$NUM" ] && [ "$IS_DRAFT" != "true" ]; then
            echo "PR #$NUM is no longer a draft (release in progress); leaving it alone."
            exit 0
          fi

          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || echo "")

          # --- Suggested bump ------------------------------------------------
          # Heuristic only; the real bump is whatever token lands in the merge
          # commit. Two signals, strongest wins:
          #   1. Conventional-commit prefixes on the queued commits — `feat!:`
          #      or a `BREAKING CHANGE` body -> major, any `feat:` -> minor.
          #   2. Changelog fragment types — any component section other than
          #      fix/ci/cleanup/misc implies feature work -> minor.
          SUBJECTS=$(git log --no-merges --pretty=format:'%s' "origin/master..HEAD")
          BODIES=$(git log --no-merges --pretty=format:'%b' "origin/master..HEAD")
          HASFEAT=$(find changelog.d -maxdepth 1 -type f -name '*.md' 2>/dev/null \
            | sed -nE 's#.*\.([a-z]+)\.md$#\1#p' \
            | grep -vE '^(fix|ci|cleanup|misc|summary)$' | head -1)
          if echo "$SUBJECTS" | grep -qE '^[a-z]+(\(.+\))?!:' \
            || echo "$BODIES" | grep -q 'BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$SUBJECTS" | grep -qE '^feat(\(.+\))?:' || [ -n "$HASFEAT" ]; then
            BUMP="minor"
          else
            BUMP="patch"
          fi

          # Project the resulting version off the latest tag.
          NEXT=""
          if echo "$LATEST_TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            v=${LATEST_TAG#v}
            MA=${v%%.*}; rest=${v#*.}; MI=${rest%%.*}; PA=${rest#*.}
            case "$BUMP" in
              major) MA=$((MA+1)); MI=0; PA=0 ;;
              minor) MI=$((MI+1)); PA=0 ;;
              patch) PA=$((PA+1)) ;;
            esac
            NEXT="v$MA.$MI.$PA"
          fi

          # Render the pending changelog from the fragments in changelog.d/.
          # towncrier writes its progress banner to stderr and the rendered
          # notes to stdout, so 2>/dev/null leaves just the changelog body.
          NEXTBARE=${NEXT#v}; NEXTBARE=${NEXTBARE:-Unreleased}
          DRAFT=$(uvx towncrier build --draft --config towncrier.toml --version "$NEXTBARE" 2>/dev/null)

          BUMP_LINE="**Suggested bump:** \`$BUMP\`"
          if [ -n "$NEXT" ]; then
            BUMP_LINE="$BUMP_LINE → would tag **$NEXT** (from ${LATEST_TAG:-no prior tag})"
          fi

          # --- Compose the body ---------------------------------------------
          RANGE="${LATEST_TAG:-origin/master}...develop"
          {
            echo "> **Draft / staging view — not meant to merge as-is.** Rebuilt automatically on every push to \`develop\`."
            echo "> To cut a release: (1) on \`develop\`, run \`task changelog:build VERSION=X.Y.Z\` to collate the \`changelog.d/\` fragments into \`CHANGELOG.md\` (add a \`summary\` fragment first if you want a lead paragraph), commit, and push; (2) rename this PR to \`Release vX.Y.Z\`, mark it **Ready for review**; (3) **merge it with a merge commit** whose message carries the bump token (\`#minor\` / \`#major\`; default \`patch\`). \`auto-tag.yml\` reads the token off the commit landing on \`master\`. Once promoted out of draft, this workflow stops editing the PR."
            echo
            echo "$BUMP_LINE"
            echo
            echo "_Bump is a guess from the queued commits + changelog fragment types (\`feat\`/non-fix section → minor, \`feat!\`/BREAKING → major, else patch). Your call — set the real bump via \`#minor\`/\`#major\` in the merge commit._"
            echo
            echo "**Diff:** [\`$RANGE\`](https://github.com/$REPO/compare/$RANGE) · **$AHEAD** commit(s) ahead of \`master\`."
            echo
            echo "### Changelog — pending (towncrier draft)"
            echo
            if echo "$DRAFT" | grep -q '[^[:space:]]'; then
              echo "$DRAFT"
            else
              echo "_No changelog fragments in \`changelog.d/\` yet._"
            fi
            echo
            echo "### Queued since ${LATEST_TAG:-the last release}"
            echo
            git log --no-merges --pretty=format:'- %s' "origin/master..HEAD"
            echo
          } > /tmp/pending-body.md

          if [ -z "$NUM" ]; then
            gh pr create --draft --base master --head develop \
              --title "📦 Pending release (develop → master)" \
              --body-file /tmp/pending-body.md
          else
            gh pr edit "$NUM" --body-file /tmp/pending-body.md
            echo "Refreshed draft PR #$NUM."
          fi
