name: VLC Container
on:
  pull_request:
  push:
    branches:
      - develop
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      COMPOSE_DOCKER_CLI_BUILD: 1
      DOCKER_BUILDKIT: 1

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build VLC container 🤖
      run: docker compose --project-directory . -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.testing.yml -f infra/docker/docker-compose.github.yml build vlc

    - name: Start VLC container
      run: docker compose --project-directory . --env-file infra/docker/env.docker -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.testing.yml -f infra/docker/docker-compose.github.yml up -d vlc

    - name: Wait for healthcheck
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8080/health/ready; then
            echo ""
            echo "VLC server is ready!"
            exit 0
          fi
          echo "Waiting for VLC server... ($i/30)"
          sleep 2
        done
        echo "VLC server failed to become ready"
        exit 1

    - name: Check VLC current video
      run: curl -v http://localhost:8080/vlc/current

    - name: Check container logs
      run: docker compose --project-directory . -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.testing.yml -f infra/docker/docker-compose.github.yml logs vlc
      if: always()

    - name: Stop containers
      run: docker compose --project-directory . -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.testing.yml -f infra/docker/docker-compose.github.yml down
      if: always()
      continue-on-error: true
