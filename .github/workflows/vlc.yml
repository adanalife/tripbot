name: vlc
on:
  pull_request:
    paths:
      - 'pkg/vlc-server/**'
      - 'pkg/vlc-client/**'
      - 'infra/docker/vlc/**'
      - 'infra/docker/docker-compose*.yml'
      - 'infra/docker/env.docker'
      - '.github/workflows/vlc.yml'
      - '.dockerignore'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - develop
    tags:
      - v*
    paths:
      - 'pkg/vlc-server/**'
      - 'pkg/vlc-client/**'
      - 'infra/docker/vlc/**'
      - 'infra/docker/docker-compose*.yml'
      - 'infra/docker/env.docker'
      - '.github/workflows/vlc.yml'
      - '.dockerignore'
      - 'go.mod'
      - 'go.sum'

# Supersede an in-flight run when new commits land on the same PR/branch —
# a superseded build's image is immediately stale, and this keeps concurrent
# Docker Hub traffic down (rate-limit avoidance).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      COMPOSE_DOCKER_CLI_BUILD: 1
      DOCKER_BUILDKIT: 1

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # Authenticate base-image pulls so they count against our Docker Hub
    # account limit rather than the shared GitHub-runner-IP anonymous
    # limit (the usual toomanyrequests source). Push stays false.
    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build VLC container 🤖
      uses: docker/build-push-action@v7
      with:
        context: .
        file: infra/docker/vlc/Dockerfile
        tags: adanalife/vlc:latest
        load: true
        cache-from: type=gha,scope=vlc
        cache-to: type=gha,mode=max,scope=vlc

    - name: Start VLC container
      run: |
        docker compose \
          --project-directory . \
          --env-file infra/docker/env.docker \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          up -d vlc

    - name: Discover VLC port
      run: |
        PORT=$(docker compose \
          --project-directory . \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          port vlc 8080 | cut -d: -f2)
        echo "VLC_PORT=$PORT" >> "$GITHUB_ENV"

    - name: Wait for healthcheck
      run: |
        # /health/live is the process-alive probe; /health/ready now
        # consults libvlc player state, which won't reach a "running"
        # status in CI because the container has no video files mounted
        # (the smoke test only verifies the server started).
        for i in $(seq 1 30); do
          if curl -sf "http://localhost:$VLC_PORT/health/live"; then
            echo ""
            echo "VLC server is alive!"
            exit 0
          fi
          echo "Waiting for VLC server... ($i/30)"
          sleep 2
        done
        echo "VLC server failed to come up"
        exit 1

    - name: Check VLC current video
      run: curl -v "http://localhost:$VLC_PORT/vlc/current"

    - name: Verify version files baked into image
      run: |
        cid=$(docker compose \
          --project-directory . \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          ps -q vlc)
        docker exec "$cid" test -s /etc/tripbot/version
        docker exec "$cid" test -s /etc/tripbot/sha
        echo "version: $(docker exec "$cid" cat /etc/tripbot/version)"
        echo "sha:     $(docker exec "$cid" cat /etc/tripbot/sha)"

    - name: Verify /version HTTP endpoint
      run: curl -fsS "http://localhost:$VLC_PORT/version"

    - name: Check container logs
      run: |
        docker compose \
          --project-directory . \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          logs vlc
      if: always()

    - name: Stop containers
      run: |
        docker compose \
          --project-directory . \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          down
      if: always()
      continue-on-error: true
