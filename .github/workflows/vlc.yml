name: VLC Container
on:
  pull_request:
  push:
    branches:
      - develop
    tags:
      - v*

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      COMPOSE_DOCKER_CLI_BUILD: 1
      DOCKER_BUILDKIT: 1

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build VLC container 🤖
      uses: docker/build-push-action@v7
      with:
        context: .
        file: infra/docker/vlc/Dockerfile
        tags: adanalife/vlc:latest
        load: true
        cache-from: type=gha,scope=vlc
        cache-to: type=gha,mode=max,scope=vlc

    - name: Start VLC container
      run: |
        docker compose \
          --project-directory . \
          --env-file infra/docker/env.docker \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          up -d vlc

    - name: Discover VLC port
      run: |
        PORT=$(docker compose \
          --project-directory . \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          port vlc 8080 | cut -d: -f2)
        echo "VLC_PORT=$PORT" >> $GITHUB_ENV

    - name: Wait for healthcheck
      run: |
        for i in $(seq 1 30); do
          if curl -sf http://localhost:$VLC_PORT/health/ready; then
            echo ""
            echo "VLC server is ready!"
            exit 0
          fi
          echo "Waiting for VLC server... ($i/30)"
          sleep 2
        done
        echo "VLC server failed to become ready"
        exit 1

    - name: Check VLC current video
      run: curl -v http://localhost:$VLC_PORT/vlc/current

    - name: Check container logs
      run: |
        docker compose \
          --project-directory . \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          logs vlc
      if: always()

    - name: Stop containers
      run: |
        docker compose \
          --project-directory . \
          -f infra/docker/docker-compose.yml \
          -f infra/docker/docker-compose.testing.yml \
          -f infra/docker/docker-compose.github.yml \
          down
      if: always()
      continue-on-error: true
