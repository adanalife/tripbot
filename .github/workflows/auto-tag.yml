name: Auto-tag on master push
on:
  push:
    branches:
      - master

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Default bump is patch. Include `#minor` or `#major` in any commit
      # message between the last tag and HEAD to override.
      #
      # Pushes are made with CI_PERSONAL_ACCESS_TOKEN rather than the
      # default GITHUB_TOKEN: tags pushed via GITHUB_TOKEN don't fire
      # downstream workflows, so release.yml wouldn't trigger on the
      # auto-created tag. The PAT inherits the token owner's perms.
      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@1
        env:
          GITHUB_TOKEN: ${{ secrets.CI_PERSONAL_ACCESS_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          RELEASE_BRANCHES: master
