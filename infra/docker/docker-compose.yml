version: '3.7'

services:
  tripbot:
    image: adanalife/tripbot
    hostname: tripbot
    env_file:
      - infra/docker/env.docker
    build:
      context: .
      dockerfile: infra/docker/tripbot/Dockerfile
    depends_on:
      - db
    ports:
      # this should match the TRIPBOT_SERVER_PORT env var
      - "8080"
    volumes:
      #TODO: do we even need this?
      - ./assets/video:/opt/data/Dashcam/_all:ro
    restart: unless-stopped

  # onscreens-server runs as its own service (mirrors the k8s split). Binds
  # :8080 via the image's ONSCREENS_SERVER_BIND_ADDRESS env. tripbot reaches
  # it at onscreens-server:8080.
  onscreens-server:
    image: adanalife/onscreens-server
    hostname: onscreens-server
    env_file:
      - infra/docker/env.docker
    build:
      context: .
      dockerfile: infra/docker/onscreens-server/Dockerfile
    ports:
      - "8080"
    restart: unless-stopped

  db:
    # pgvector/pgvector:pg16 is a drop-in for postgres:16-alpine that adds the
    # `vector` extension (used by frame_embeddings / dashcam-cv visual search).
    image: ghcr.io/adanalife/mirror/pgvector:pg16
    restart: always
    ports:
      - "5432"
    environment:
      POSTGRES_PASSWORD: "${DATABASE_PASS}"
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_DB: "${DATABASE_DB}"
    # data persistence is opt-in per environment (see docker-compose.development.yml)

  migrate:
    image: ghcr.io/adanalife/mirror/migrate:4
    depends_on:
      - db
    volumes:
      - ./db/migrate:/migrations
    command: [
      "-path", "/migrations",
      "-database",  "postgres://${DATABASE_USER}:${DATABASE_PASS}@${DATABASE_HOST}:5432/${DATABASE_DB}?sslmode=disable",
      "up"
    ]
    restart: on-failure

  seed:
    image: adanalife/tripbot
    env_file:
      - infra/docker/env.docker
    depends_on:
      - migrate
    working_dir: /go/src/github.com/adanalife/tripbot
    entrypoint: bash -c "infra/docker/bin/seed-db.sh"
    #TODO: this can be removed once the script is baked into the image
    volumes:
      - .:/go/src/github.com/adanalife/tripbot
    restart: on-failure
