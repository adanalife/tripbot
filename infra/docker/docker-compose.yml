version: '3.7'

services:
  tripbot:
    image: adanalife/tripbot
    hostname: tripbot
    env_file:
      - infra/docker/env.docker
    build:
      context: .
      dockerfile: infra/docker/tripbot/Dockerfile
    depends_on:
      - db
    ports:
      # this should match the TRIPBOT_SERVER_PORT env var
      - "8080"
    volumes:
      #TODO: do we even need this?
      - ./assets/video:/opt/data/Dashcam/_all:ro
    restart: unless-stopped

  obs:
    # privileged: true                       # not needed without GPU passthrough
    image: adanalife/obs
    hostname: obs
    # env_file:                              # entrypoint reads only STREAM_KEY directly
    #   - infra/docker/env.docker
    build:
      context: .
      dockerfile: infra/docker/obs/Dockerfile
    depends_on:
      - vlc                                  # vlc must be up so RTSP source resolves
    ports:
      - "5902:5900"
      - "4455:4455"                          # obs-websocket control plane
    environment:
      # DISPLAY: ":0.0"                      # entrypoint sets DISPLAY internally
      # XDG_RUNTIME_DIR: "/root/.cache/xdgr"
      # FONTCONFIG_PATH: "/etc/fonts"
      STREAM_KEY: "${STREAM_KEY:-}"
      DASHCAM_RTSP_URL: "${DASHCAM_RTSP_URL:-rtsp://vlc:8554/dashcam}"
      # OBS browser sources fetch onscreen state from vlc-server's HTTP API.
      ONSCREENS_URL_BASE: "${ONSCREENS_URL_BASE:-http://vlc:8080}"
      OBS_WEBSOCKET_PASSWD: "${OBS_WEBSOCKET_PASSWD:-adanalife}"
    restart: unless-stopped

  vlc:
    privileged: true
    image: adanalife/vlc
    hostname: vlc
    env_file:
      - infra/docker/env.docker
    build:
      context: .
      dockerfile: infra/docker/vlc/Dockerfile
    ports:
      # this should match the VLC_SERVER_HOST env var
      - "8080"
      - "5903:5900"
      - "8554:8554"
    environment:
      DISPLAY: ":0.0"
      XDG_RUNTIME_DIR: "/root/.cache/xdgr"
      # hack to make fontconfig happy
      FONTCONFIG_PATH: "/etc/fonts"
    volumes:
      - .:/go/src/github.com/adanalife/tripbot
      - ./assets/video:/opt/data/Dashcam/_all:ro
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: always
    ports:
      - "5432"
    environment:
      POSTGRES_PASSWORD: "${DATABASE_PASS}"
      POSTGRES_USER: "${DATABASE_USER}"
      POSTGRES_DB: "${DATABASE_DB}"
    # data persistence is opt-in per environment (see docker-compose.development.yml)

  migrate:
    image: migrate/migrate
    depends_on:
      - db
    volumes:
      - ./db/migrate:/migrations
    command: [
      "-path", "/migrations",
      "-database",  "postgres://${DATABASE_USER}:${DATABASE_PASS}@${DATABASE_HOST}:5432/${DATABASE_DB}?sslmode=disable",
      "up"
    ]
    restart: on-failure

  seed:
    image: adanalife/tripbot
    env_file:
      - infra/docker/env.docker
    depends_on:
      - migrate
    working_dir: /go/src/github.com/adanalife/tripbot
    entrypoint: bash -c "infra/docker/bin/seed-db.sh"
    #TODO: this can be removed once the script is baked into the image
    volumes:
      - .:/go/src/github.com/adanalife/tripbot
    restart: on-failure
