version: '3.7'

services:
  tripbot:
    environment:
      ENV: production
      DISABLE_TWITCH_WEBHOOKS: "false"
    ports:
      # matching the port in the twitch oauth app
      - "4569:8080"
    env_file:
      - ./.env.production
    depends_on: []
    restart: always

  db:
    deploy:
      # don't use a db in prod
      replicas: 0
