# wayvnc config. The cert + key are generated per pod start by
# entrypoint.sh and live in $XDG_RUNTIME_DIR — paths below match.
#
# relax_encryption=true keeps the legacy "None" security type on the
# wire for clients that don't speak VeNCrypt; the cert is there for
# clients (macOS Screen Sharing.app in particular) that refuse to
# connect without an encrypted offer. Suitable for our debug-only,
# port-forwarded VNC posture — not the auth-grade hardening this
# config can be configured to do.

address=0.0.0.0
port=5900

# VeNCrypt (TLS-wrapped VNC) — Screen Sharing.app prefers this over
# plain "None". Self-signed cert; clients will see a "Verify
# Certificate" prompt the first time they connect.
private_key_file=/tmp/runtime-root/wayvnc.key
certificate_file=/tmp/runtime-root/wayvnc.crt

# Let clients pick "None" too. Without this wayvnc would refuse non-
# encrypted negotiations once any cert is configured, locking out
# clients that don't grok VeNCrypt.
relax_encryption=true
