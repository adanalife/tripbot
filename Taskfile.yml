version: '3'

# All *docker* targets shell into the `test` service defined in
# infra/docker/docker-compose.testing.yml via bin/devenv. Env vars
# come from .env.testing; module/build caches live in named volumes.
#
# Native macOS targets (`*:macos`) instead build on the host against the
# libvlc bundled inside VLC.app. The CGO incantation lives in the vars
# below so it's defined once; `_vlc-deps` auto-installs VLC.app if the
# headers are missing. See vault/tripbot/vlc-server/gotchas.md for why the
# rpath / -Wno-error flags are needed.

vars:
  # libvlc header dir inside VLC.app — needed by every cgo compile.
  VLC_CFLAGS: -I/Applications/VLC.app/Contents/MacOS/include
  # Link flags for builds/tests/runs. rpath is required for `go test` /
  # `go run` too (not just build), else `dyld: Library not loaded`. Do NOT
  # add `-lvlc` — libvlc-go's own #cgo directive does it. -Wno-error mutes
  # a libvlc-go/v3-vs-Apple-clang fatal that's harmless at runtime.
  VLC_LDFLAGS: -L/Applications/VLC.app/Contents/MacOS/lib -Wl,-rpath,/Applications/VLC.app/Contents/MacOS/lib -Wno-error=incompatible-function-pointer-types
  # Sentinel file proving the libvlc headers are present.
  VLC_HEADER: /Applications/VLC.app/Contents/MacOS/include/vlc/vlc.h

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all unit tests
    cmds:
      - ENV=testing bin/devenv run --rm test go test ./...

  test:cover:
    desc: Run tests with coverage + race detector; prints per-function and total coverage
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -v -race -covermode=atomic -coverprofile=coverage.out ./... && go tool cover -func=coverage.out'

  test:cover:html:
    desc: Generate HTML coverage report at coverage.html
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html'
      - 'echo "Open coverage.html in your browser"'

  test:race:
    desc: Run tests with the race detector (slower; surfaces data races)
    cmds:
      - ENV=testing bin/devenv run --rm test go test -race ./...

  # Auto-installs VLC.app (which bundles libvlc + its headers) when the cgo
  # headers are missing, so every native `*:macos` build/test below "just
  # works" on a fresh machine. The `status:` check makes this a no-op once
  # the headers are present, so it's cheap to depend on.
  _vlc-deps:
    internal: true
    platforms: [darwin]
    status:
      - test -f {{.VLC_HEADER}}
    cmds:
      - echo "→ libvlc headers not found; installing VLC.app via Homebrew (needed for cgo)…"
      - brew install --cask vlc
      - |
        test -f {{.VLC_HEADER}} || {
          echo "✗ VLC installed but headers still missing at {{.VLC_HEADER}}" >&2
          echo "  (an existing non-cask VLC.app can lack headers — try: brew install --cask --force vlc)" >&2
          exit 1
        }

  # Native macOS test runner — host mise + VLC.app's bundled libvlc, no
  # docker. `dotenv` injects .env.testing's keys as real env vars so the
  # config loader resolves them from the environment — `go test` runs each
  # package from its own dir, so the .env.testing file isn't on the path.
  test:macos:
    desc: Run all unit tests natively on macOS (host mise, no docker)
    platforms: [darwin]
    deps: [_vlc-deps]
    dotenv: ['.env.testing']
    env:
      ENV: testing
      CGO_CFLAGS: '{{.VLC_CFLAGS}}'
      CGO_LDFLAGS: '{{.VLC_LDFLAGS}}'
    cmds:
      - mise exec -- go test ./...

  build:macos:
    desc: Build everything natively on macOS against VLC.app's libvlc (host mise, no docker)
    platforms: [darwin]
    deps: [_vlc-deps]
    env:
      CGO_CFLAGS: '{{.VLC_CFLAGS}}'
      CGO_LDFLAGS: '{{.VLC_LDFLAGS}}'
    cmds:
      - mise exec -- go build ./...

  shell:
    desc: Open an interactive Go-toolchain shell inside the test container
    interactive: true
    cmds:
      - ENV=testing bin/devenv run --rm test bash

  auth:bootstrap:
    desc: Bootstrap BOTH Twitch OAuth identities (bot + broadcaster) back-to-back. Run on host (needs a browser); bring up Postgres first (`bin/devenv up -d db migrate` locally, or `task tripbot:db:up` in infra for cluster DB). Sign in as the bot account when the first browser tab opens, then as the broadcaster on the second.
    cmds:
      - task: auth:bootstrap:bot
      - task: auth:bootstrap:broadcaster

  auth:bootstrap:bot:
    desc: Bootstrap the bot's Twitch OAuth token (chat:read/edit etc.). Writes the row to oauth_tokens keyed by BOT_USERNAME.
    env:
      ENV: '{{.ENV | default "development"}}'
      DATABASE_HOST: '{{.DATABASE_HOST | default "localhost"}}'
      EXTERNAL_URL: '{{.EXTERNAL_URL | default "http://localhost:8080"}}'
    cmds:
      - |
        secret=$(aws-vault exec adanalife-stage -- \
          aws secretsmanager get-secret-value \
          --secret-id k8s/tripbot/twitch-creds \
          --query SecretString --output text)
        export TWITCH_CLIENT_ID=$(echo "$secret" | jq -r .TWITCH_CLIENT_ID)
        export TWITCH_CLIENT_SECRET=$(echo "$secret" | jq -r .TWITCH_CLIENT_SECRET)
        printf '\a'
        mise exec -- go run ./cmd/auth-bootstrap --account=bot

  auth:bootstrap:broadcaster:
    desc: Bootstrap the broadcaster's Twitch OAuth token (channel:read:subscriptions, moderator:read:followers, user:edit:broadcast). Writes the row to oauth_tokens keyed by CHANNEL_NAME. Required for subscriber/follower polling.
    env:
      ENV: '{{.ENV | default "development"}}'
      DATABASE_HOST: '{{.DATABASE_HOST | default "localhost"}}'
      EXTERNAL_URL: '{{.EXTERNAL_URL | default "http://localhost:8080"}}'
    cmds:
      - |
        secret=$(aws-vault exec adanalife-stage -- \
          aws secretsmanager get-secret-value \
          --secret-id k8s/tripbot/twitch-creds \
          --query SecretString --output text)
        export TWITCH_CLIENT_ID=$(echo "$secret" | jq -r .TWITCH_CLIENT_ID)
        export TWITCH_CLIENT_SECRET=$(echo "$secret" | jq -r .TWITCH_CLIENT_SECRET)
        printf '\a'
        mise exec -- go run ./cmd/auth-bootstrap --account=broadcaster

  # Release smoke flow — see vault/tripbot/release-checklist.md.
  # Targets the local k3d cluster running the stage-1 overlay
  # (cloudflared tunnel + apps).

  release:verify-images:
    desc: Verify multi-arch manifests for a release version (VERSION=v2.0.2 or 2.0.2)
    requires:
      vars: [VERSION]
    vars:
      # docker/metadata-action strips the leading "v" — Docker tags are
      # bare semver. Accept either VERSION=v2.0.2 or VERSION=2.0.2.
      TAG: '{{trimPrefix "v" .VERSION}}'
    cmds:
      - docker buildx imagetools inspect adanalife/tripbot:{{.TAG}}
      - docker buildx imagetools inspect adanalife/vlc:{{.TAG}}
      - docker buildx imagetools inspect adanalife/obs:{{.TAG}}

  release:smoke:whalecore:
    desc: Smoke-check tripbot.whalecore.com (requires allowlisted IP). Blocks on failure.
    cmds:
      - curl -sfS --max-time 10 https://tripbot.whalecore.com/health/live > /dev/null
      - 'echo "✓ tripbot.whalecore.com/health/live"'

  release:smoke:local:
    desc: Smoke-check in-cluster tripbot+vlc-server health via kubectl port-forward.
    cmds:
      - bin/release-smoke-local

  release:smoke:stage-1:
    desc: Deploy stage-1 to local k3d, wait for rollouts, smoke-test public+local.
    cmds:
      - task -d {{.HOME}}/adanalife/infra k8s-apply-stage-1
      - kubectl rollout status deploy/tripbot     --timeout=120s
      - kubectl rollout status deploy/vlc-server  --timeout=120s
      - kubectl rollout status deploy/obs         --timeout=120s
      - kubectl rollout status deploy/cloudflared --timeout=60s
      - task: release:smoke:local
      - task: release:smoke:whalecore

  release:smoke:
    desc: Alias for release:smoke:stage-1
    cmds:
      - task: release:smoke:stage-1

  obs:browser:refresh:
    desc: Refresh all OBS browser sources via websocket (docker-compose; OBS must be running)
    env:
      OBS_WEBSOCKET_PASSWD: '{{.OBS_WEBSOCKET_PASSWD | default "adanalife"}}'
    cmds:
      - uv run --with obsws-python bin/obs-browser-refresh

  # vlc-server-scoped native macOS targets. CGO flags come from the
  # VLC_CFLAGS / VLC_LDFLAGS vars at the top of this file (which carry the
  # rpath / -lvlc / -Wno-error rationale); both depend on _vlc-deps so VLC
  # gets installed if missing. See vault/tripbot/vlc-server/gotchas.md.

  vlc-server:vet:macos:
    desc: Run `go vet` on vlc-server against VLC.app's libvlc headers (no link)
    platforms: [darwin]
    deps: [_vlc-deps]
    env:
      CGO_CFLAGS: '{{.VLC_CFLAGS}}'
    cmds:
      - mise exec -- go vet ./pkg/vlc-server/...

  vlc-server:build:macos:
    desc: Build vlc-server natively on macOS against VLC.app's libvlc
    platforms: [darwin]
    deps: [_vlc-deps]
    env:
      CGO_CFLAGS: '{{.VLC_CFLAGS}}'
      CGO_LDFLAGS: '{{.VLC_LDFLAGS}}'
    cmds:
      - mise exec -- go build -o bin/vlc-server ./cmd/vlc-server

  cv:stats:
    desc: 'Quick dashcam-cv coverage/size/rate via psql, no model load (NS=stage-1 default)'
    vars:
      NS: '{{.NS | default "stage-1"}}'
    cmds:
      - >-
        kubectl -n {{.NS}} exec postgres-0 -- bash -c 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "SELECT (SELECT count(*) FROM videos WHERE NOT flagged) AS total_videos, (SELECT count(DISTINCT video_id) FROM frame_embeddings) AS embedded, (SELECT count(*) FROM frame_embeddings) AS frames, (SELECT count(DISTINCT video_id) FROM frame_embeddings WHERE date_created > now() - make_interval(hours => 1)) AS videos_last_hr, pg_size_pretty(pg_total_relation_size('"'"'frame_embeddings'"'"')) AS size;"'
