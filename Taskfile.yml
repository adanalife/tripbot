version: '3'

# All targets shell into the `test` service defined in
# infra/docker/docker-compose.testing.yml via bin/devenv. The image
# (infra/docker/test/Dockerfile) bakes libvlc-dev in, env vars come
# from .env.testing, and module/build caches live in named volumes.

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all unit tests
    cmds:
      - ENV=testing bin/devenv run --rm test go test ./...

  test:cover:
    desc: Run tests with coverage; prints per-function and total coverage
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -coverprofile=coverage.out ./... && go tool cover -func=coverage.out'

  test:cover:html:
    desc: Generate HTML coverage report at coverage.html
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html'
      - 'echo "Open coverage.html in your browser"'

  test:race:
    desc: Run tests with the race detector (slower; surfaces data races)
    cmds:
      - ENV=testing bin/devenv run --rm test go test -race ./...

  shell:
    desc: Open an interactive Go-toolchain shell with libvlc-dev installed
    interactive: true
    cmds:
      - ENV=testing bin/devenv run --rm test bash
