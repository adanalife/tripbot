version: '3'

vars:
  GO_IMAGE: golang:1.21-bookworm
  DOCKER_RUN: >-
    docker run --rm
    -v {{.ROOT_DIR}}:/src
    -v tripbot-gomod-cache:/go/pkg/mod
    -v tripbot-gobuild-cache:/root/.cache/go-build
    --env-file {{.ROOT_DIR}}/script/test.env
    -w /src
    {{.GO_IMAGE}}
  DOCKER_BOOT: 'apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq libvlc-dev >/dev/null 2>&1'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  cache:init:
    desc: Create the persistent docker volumes used to cache Go module/build output
    cmds:
      - docker volume create tripbot-gomod-cache
      - docker volume create tripbot-gobuild-cache

  test:
    desc: Run all unit tests in Docker (libvlc-dev required)
    cmds:
      - "{{.DOCKER_RUN}} bash -c '{{.DOCKER_BOOT}} && go test ./...'"

  test:cover:
    desc: Run tests with coverage; prints per-function and total coverage
    cmds:
      - "{{.DOCKER_RUN}} bash -c '{{.DOCKER_BOOT}} && go test -coverprofile=coverage.out ./... && go tool cover -func=coverage.out'"

  test:cover:html:
    desc: Generate HTML coverage report at coverage.html
    cmds:
      - "{{.DOCKER_RUN}} bash -c '{{.DOCKER_BOOT}} && go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html'"
      - 'echo "Open coverage.html in your browser"'

  test:race:
    desc: Run tests with the race detector (slower; surfaces data races)
    cmds:
      - "{{.DOCKER_RUN}} bash -c '{{.DOCKER_BOOT}} && go test -race ./...'"

  build:
    desc: Build both binaries inside the Docker image (CGO_ENABLED=0)
    cmds:
      - "{{.DOCKER_RUN}} bash -c '{{.DOCKER_BOOT}} && CGO_ENABLED=0 go build -o /tmp/tripbot ./cmd/tripbot && CGO_ENABLED=0 go build -o /tmp/vlc-server ./cmd/vlc-server'"

  shell:
    desc: Open an interactive Go-toolchain shell with libvlc-dev installed
    interactive: true
    cmds:
      - "docker run --rm -it -v {{.ROOT_DIR}}:/src -v tripbot-gomod-cache:/go/pkg/mod -v tripbot-gobuild-cache:/root/.cache/go-build --env-file {{.ROOT_DIR}}/script/test.env -w /src {{.GO_IMAGE}} bash -c '{{.DOCKER_BOOT}} && bash'"
