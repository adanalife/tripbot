version: '3'

# All targets shell into the `test` service defined in
# infra/docker/docker-compose.testing.yml via bin/devenv. Env vars
# come from .env.testing; module/build caches live in named volumes.

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all unit tests
    cmds:
      - ENV=testing bin/devenv run --rm test go test ./...

  test:cover:
    desc: Run tests with coverage + race detector; prints per-function and total coverage
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -v -race -covermode=atomic -coverprofile=coverage.out ./... && go tool cover -func=coverage.out'

  test:cover:html:
    desc: Generate HTML coverage report at coverage.html
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html'
      - 'echo "Open coverage.html in your browser"'

  test:race:
    desc: Run tests with the race detector (slower; surfaces data races)
    cmds:
      - ENV=testing bin/devenv run --rm test go test -race ./...

  # Native macOS test runner — host mise + VLC.app's bundled libvlc, no
  # docker. Mirrors vlc-server:build:macos's CGO incantation (rpath is
  # required for `go test` too).
  # `dotenv` injects .env.testing's keys as real env vars so the config
  # loader resolves them from the environment — `go test` runs each package
  # from its own dir, so the .env.testing file itself isn't on the path.
  test:macos:
    desc: Run all unit tests natively on macOS (host mise, no docker)
    platforms: [darwin]
    dotenv: ['.env.testing']
    env:
      ENV: testing
      CGO_CFLAGS: -I/Applications/VLC.app/Contents/MacOS/include
      CGO_LDFLAGS: -L/Applications/VLC.app/Contents/MacOS/lib -Wl,-rpath,/Applications/VLC.app/Contents/MacOS/lib -Wno-error=incompatible-function-pointer-types
    cmds:
      - mise exec -- go test ./...

  shell:
    desc: Open an interactive Go-toolchain shell inside the test container
    interactive: true
    cmds:
      - ENV=testing bin/devenv run --rm test bash

  # Twitch OAuth consent + token bootstrap is owned by the platform-gateway now
  # (gateway-twitch's /auth/* flow writes the oauth_tokens rows). The old
  # `auth:bootstrap*` tasks + cmd/auth-bootstrap were removed with that cutover;
  # re-auth is a browser click at the gateway consent page (surfaced in tripbot-console).

  # Changelog (towncrier). Fragments live in changelog.d/; assembled into
  # CHANGELOG.md at release time. Run on the host via uvx — no project dep.
  changelog:add:
    desc: 'Scaffold a changelog fragment (PR=123 TYPE=fix). Types: gateway chatbot onscreens vlc console fix deploy ci cleanup misc summary'
    requires:
      vars: [PR]
    vars:
      TYPE: '{{.TYPE | default "misc"}}'
    cmds:
      - uvx towncrier create --config towncrier.toml --edit {{.PR}}.{{.TYPE}}.md

  changelog:preview:
    desc: Preview the pending changelog from the current fragments (towncrier draft)
    cmds:
      - uvx towncrier build --draft --config towncrier.toml --version {{.VERSION | default "Unreleased"}}

  changelog:build:
    desc: Collate fragments into CHANGELOG.md for a release + delete them (VERSION=3.9.0)
    requires:
      vars: [VERSION]
    cmds:
      - uvx towncrier build --yes --config towncrier.toml --version {{trimPrefix "v" .VERSION}}

  # Release smoke flow.
  # Targets the local k3d cluster running the stage-1 overlay
  # (cloudflared tunnel + apps).

  release:verify-images:
    desc: Verify multi-arch manifests for a release version (VERSION=v2.0.2 or 2.0.2)
    requires:
      vars: [VERSION]
    vars:
      # docker/metadata-action strips the leading "v" — Docker tags are
      # bare semver. Accept either VERSION=v2.0.2 or VERSION=2.0.2.
      TAG: '{{trimPrefix "v" .VERSION}}'
    cmds:
      - docker buildx imagetools inspect adanalife/tripbot:{{.TAG}}
      - docker buildx imagetools inspect adanalife/vlc:{{.TAG}}

  release:smoke:whalecore:
    desc: Smoke-check tripbot.whalecore.com (requires allowlisted IP). Blocks on failure.
    cmds:
      - curl -sfS --max-time 10 https://tripbot.whalecore.com/health/live > /dev/null
      - 'echo "✓ tripbot.whalecore.com/health/live"'

  release:smoke:local:
    desc: Smoke-check in-cluster tripbot+vlc-server health via kubectl port-forward.
    cmds:
      - bin/release-smoke-local

  release:smoke:stage-1:
    desc: Deploy stage-1 to local k3d, wait for rollouts, smoke-test public+local.
    cmds:
      - task -d {{.HOME}}/adanalife/infra k8s-apply-stage-1
      - kubectl rollout status deploy/tripbot     --timeout=120s
      - kubectl rollout status deploy/vlc-server  --timeout=120s
      - kubectl rollout status deploy/cloudflared --timeout=60s
      - task: release:smoke:local
      - task: release:smoke:whalecore

  release:smoke:
    desc: Alias for release:smoke:stage-1
    cmds:
      - task: release:smoke:stage-1

  # vlc-server native macOS build — links against the libvlc bundled
  # inside VLC.app. Saves recreating the CGO incantation from memory.
  # Key bits:
  #   * rpath is required for `go test` / `go run`, not just `go build` —
  #     otherwise `dyld: Library not loaded: @rpath/libvlc.dylib`.
  #   * Do NOT add `-lvlc` to LDFLAGS — libvlc-go's own #cgo LDFLAGS
  #     directive already does it; duplicating triggers a linker warning.
  #   * `-Wno-error=incompatible-function-pointer-types` mutes a
  #     libvlc-go/v3 vs Apple-clang fatal that's harmless at runtime.

  vlc-server:vet:macos:
    desc: Run `go vet` on vlc-server against VLC.app's libvlc headers (no link)
    platforms: [darwin]
    env:
      CGO_CFLAGS: -I/Applications/VLC.app/Contents/MacOS/include
    cmds:
      - mise exec -- go vet ./pkg/vlc-server/...

  vlc-server:build:macos:
    desc: Build vlc-server natively on macOS against VLC.app's libvlc
    platforms: [darwin]
    env:
      CGO_CFLAGS: -I/Applications/VLC.app/Contents/MacOS/include
      CGO_LDFLAGS: -L/Applications/VLC.app/Contents/MacOS/lib -Wl,-rpath,/Applications/VLC.app/Contents/MacOS/lib -Wno-error=incompatible-function-pointer-types
    cmds:
      - mise exec -- go build -o bin/vlc-server ./cmd/vlc-server

  # cdk8s — the Python authoring layer for tripbot's app workload manifests
  # (cdk8s/). Synthesizes dist/<env>-<component>-<platform>.k8s.yaml (+ the
  # per-env identity unit + the one-shot Job files), which Argo delivers
  # cross-repo. The stateful + shared-platform units stay in infra/cdk8s.
  cdk8s:imports:
    desc: Generate the typed k8s + ESO constructs (cdk8s import) into cdk8s/imports/ — gitignored, needed before synth/test on a fresh checkout
    dir: cdk8s
    cmds:
      - mise exec -- uv run cdk8s import

  cdk8s:synth:
    desc: Synthesize the manifests (offline) -> cdk8s/dist/<env>-<component>-<platform>.k8s.yaml (+ identity / jobs)
    dir: cdk8s
    deps: [cdk8s:imports]
    cmds:
      - mise exec -- uv run cdk8s synth
      # prod-1 app manifests are pinned to their release version: frozen here and
      # regenerated only on release-please's release PR, so a chart change on
      # main doesn't reach prod's committed dist until the next release — which
      # is what puts the config delta in the same diff as the version bump.
      # Discard this HEAD re-synth of the pinned app files; identity + one-shot
      # jobs (no -twitch/-youtube suffix) stay live and re-synth normally.
      - |
        pinned=$(git ls-files -- 'dist/prod-1-*-twitch.k8s.yaml' 'dist/prod-1-*-youtube.k8s.yaml')
        [ -n "$pinned" ] && git checkout -- $pinned || true

  cdk8s:test:
    desc: Run the cdk8s synth-time checks on the committed dist/
    dir: cdk8s
    deps: [cdk8s:imports]
    cmds:
      - mise exec -- uv run pytest -q

  cdk8s:check:
    desc: Golden-file gate — re-synth and fail if cdk8s/dist/ is stale (run cdk8s:synth and commit)
    dir: cdk8s
    cmds:
      - task: cdk8s:synth
      - git diff --exit-code -- dist/ || { echo "dist/ is stale — run task cdk8s:synth and commit"; exit 1; }

  cdk8s:verify:
    desc: The cdk8s edit loop in one step — synth, show what changed in dist/, run the synth-time checks
    dir: cdk8s
    cmds:
      - task: cdk8s:synth
      - git status --short -- dist/
      - git diff --stat -- dist/
      - mise exec -- uv run pytest -q

  cdk8s:stage:diff:
    desc: kubectl diff the synthed stage-1 app manifests against the live cluster (read-only)
    dir: cdk8s
    cmds:
      - task: cdk8s:synth
      - for: { var: f, split: "\n" }
        cmd: kubectl diff -f "{{.f}}" || true
        vars:
          f:
            sh: ls dist/stage-1-*.k8s.yaml | grep -v -- '-job-'

  cdk8s:prod:diff:
    desc: kubectl diff the committed (release-pinned) prod-1 app manifests against the live cluster (read-only)
    dir: cdk8s
    cmds:
      - task: cdk8s:synth
      - for: { var: f, split: "\n" }
        cmd: kubectl diff -f "{{.f}}" || true
        vars:
          f:
            sh: ls dist/prod-1-*.k8s.yaml | grep -v -- '-job-'

  cdk8s:prod:bump:
    desc: 'Regenerate one prod-1 component''s pinned manifests after a hand pin edit in versions.yaml (COMPONENT=vlc|tripbot|onscreens-server), e.g. a rollback'
    dir: cdk8s
    deps: [cdk8s:imports]
    requires:
      vars: [COMPONENT]
    cmds:
      # Full synth regenerates ALL prod app files from HEAD; freeze every OTHER
      # component back to its own pinned release so only COMPONENT's manifests
      # change (its tag + any config delta this release introduced). DISTNAME
      # strips the -server suffix (onscreens-server -> onscreens); tripbot/vlc
      # are unchanged.
      - mise exec -- uv run cdk8s synth
      - |
        distname="{{.COMPONENT}}"; distname="${distname%-server}"
        others=$(git ls-files -- 'dist/prod-1-*-twitch.k8s.yaml' 'dist/prod-1-*-youtube.k8s.yaml' | grep -v "prod-1-${distname}-" || true)
        [ -n "$others" ] && git checkout -- $others || true
