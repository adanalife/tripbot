version: '3'

# All targets shell into the `test` service defined in
# infra/docker/docker-compose.testing.yml via bin/devenv-test, which
# loads .env.testing automatically. libvlc-dev is installed at startup
# of each run; module/build caches are persisted in named volumes.

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all unit tests
    cmds:
      - bin/devenv-test run --rm test bash -c 'apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq libvlc-dev >/dev/null 2>&1 && go test ./...'

  test:cover:
    desc: Run tests with coverage; prints per-function and total coverage
    cmds:
      - bin/devenv-test run --rm test bash -c 'apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq libvlc-dev >/dev/null 2>&1 && go test -coverprofile=coverage.out ./... && go tool cover -func=coverage.out'

  test:cover:html:
    desc: Generate HTML coverage report at coverage.html
    cmds:
      - bin/devenv-test run --rm test bash -c 'apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq libvlc-dev >/dev/null 2>&1 && go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html'
      - 'echo "Open coverage.html in your browser"'

  test:race:
    desc: Run tests with the race detector (slower; surfaces data races)
    cmds:
      - bin/devenv-test run --rm test bash -c 'apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq libvlc-dev >/dev/null 2>&1 && go test -race ./...'

  shell:
    desc: Open an interactive Go-toolchain shell with libvlc-dev installed
    interactive: true
    cmds:
      - bin/devenv-test run --rm test bash -c 'apt-get update -qq >/dev/null 2>&1 && apt-get install -y -qq libvlc-dev >/dev/null 2>&1 && bash'
