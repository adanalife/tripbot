version: '3'

# All targets shell into the `test` service defined in
# infra/docker/docker-compose.testing.yml via bin/devenv. Env vars
# come from .env.testing; module/build caches live in named volumes.

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run all unit tests
    cmds:
      - ENV=testing bin/devenv run --rm test go test ./...

  test:cover:
    desc: Run tests with coverage + race detector; prints per-function and total coverage
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -v -race -covermode=atomic -coverprofile=coverage.out ./... && go tool cover -func=coverage.out'

  test:cover:html:
    desc: Generate HTML coverage report at coverage.html
    cmds:
      - ENV=testing bin/devenv run --rm test bash -c 'go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html'
      - 'echo "Open coverage.html in your browser"'

  test:race:
    desc: Run tests with the race detector (slower; surfaces data races)
    cmds:
      - ENV=testing bin/devenv run --rm test go test -race ./...

  shell:
    desc: Open an interactive Go-toolchain shell inside the test container
    interactive: true
    cmds:
      - ENV=testing bin/devenv run --rm test bash

  auth:bootstrap:
    desc: One-time Twitch OAuth bootstrap; writes refresh token to oauth_tokens. Run on host (needs a browser); bring up Postgres first (`bin/devenv up -d db migrate` locally, or `task tripbot:db:up` in infra for cluster DB).
    env:
      # Local-bootstrap defaults. Override at the shell to point elsewhere.
      ENV: '{{.ENV | default "development"}}'
      DATABASE_HOST: '{{.DATABASE_HOST | default "localhost"}}'
      EXTERNAL_URL: '{{.EXTERNAL_URL | default "http://localhost:8080"}}'
    cmds:
      # Pull Twitch app credentials from SM so they never live in env.docker.
      # `mise exec --` activates the pinned Go toolchain in task's
      # non-interactive subshell (where ~/.zshrc isn't sourced).
      - |
        secret=$(aws-vault exec adanalife-stage -- \
          aws secretsmanager get-secret-value \
          --secret-id k8s/tripbot/twitch-creds \
          --query SecretString --output text)
        export TWITCH_CLIENT_ID=$(echo "$secret" | jq -r .TWITCH_CLIENT_ID)
        export TWITCH_CLIENT_SECRET=$(echo "$secret" | jq -r .TWITCH_CLIENT_SECRET)
        mise exec -- go run ./cmd/auth-bootstrap

  # Release smoke flow — see vault/tripbot/release-checklist.md.
  # Targets the local k3d cluster running the stage-1 overlay
  # (cloudflared tunnel + apps).

  release:verify-images:
    desc: Verify multi-arch manifests for a release version (VERSION=v2.0.2 or 2.0.2)
    requires:
      vars: [VERSION]
    vars:
      # docker/metadata-action strips the leading "v" — Docker tags are
      # bare semver. Accept either VERSION=v2.0.2 or VERSION=2.0.2.
      TAG: '{{trimPrefix "v" .VERSION}}'
    cmds:
      - docker buildx imagetools inspect adanalife/tripbot:{{.TAG}}
      - docker buildx imagetools inspect adanalife/vlc:{{.TAG}}
      - docker buildx imagetools inspect adanalife/obs:{{.TAG}}

  release:smoke:whalecore:
    desc: Smoke-check tripbot.whalecore.com (requires allowlisted IP). Blocks on failure.
    cmds:
      - curl -sfS --max-time 10 https://tripbot.whalecore.com/health/live > /dev/null
      - 'echo "✓ tripbot.whalecore.com/health/live"'

  release:smoke:local:
    desc: Smoke-check in-cluster tripbot+vlc-server health via kubectl port-forward.
    cmds:
      - bin/release-smoke-local

  release:smoke:stage-1:
    desc: Deploy stage-1 to local k3d, wait for rollouts, smoke-test public+local.
    cmds:
      - task -d {{.HOME}}/adanalife/infra k8s-apply-stage-1
      - kubectl rollout status deploy/tripbot     --timeout=120s
      - kubectl rollout status deploy/vlc-server  --timeout=120s
      - kubectl rollout status deploy/obs         --timeout=120s
      - kubectl rollout status deploy/cloudflared --timeout=60s
      - task: release:smoke:local
      - task: release:smoke:whalecore

  release:smoke:
    desc: Alias for release:smoke:stage-1
    cmds:
      - task: release:smoke:stage-1

  obs:browser:refresh:
    desc: Refresh all OBS browser sources via websocket (docker-compose; OBS must be running)
    cmds:
      - uv run --with obsws-python bin/obs-browser-refresh
